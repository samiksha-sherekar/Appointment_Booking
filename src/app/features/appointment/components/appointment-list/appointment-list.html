<div class="card">

  <div class="d-flex justify-content-between align-items-center mb-2">
    <h6 class="mb-0">Appointments</h6>
    <span class="badge bg-primary">{{filteredData.length}}</span>
  </div>

  <!-- 🔍 Search -->
  <input
    class="form-control search-input"
    placeholder="Search appointments..."
    [(ngModel)]="searchText"
  />

  <!-- 📋 Cards -->
  <div class="mt-3">
    <app-appointment-card
      *ngFor="let a of filteredData"
      [data]="a"
      (statusChange)="update($event)">
    </app-appointment-card>
  </div>

  <!-- ❌ Empty -->
  <div *ngIf="filteredData.length === 0" class="text-center text-muted mt-3">
    No appointments found
  </div>

</div>
